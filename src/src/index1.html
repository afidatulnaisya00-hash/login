<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login And Sign Up</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

<!-- CONTAINER -->
<div class="w-[90%] max-w-[1000px] h-[600px] bg-white rounded-3xl shadow-xl flex overflow-hidden">

  <!-- KIRI (GAMBAR) -->
  <div class="w-1/2">
    <img src="/img/bg.jpg" class="w-full h-full object-cover border-radius: var(--radius-md)">
  </div>

  <!-- KANAN -->
  <div class="w-1/2 flex items-center justify-center p-10">

    <!-- LOGIN -->
    <div id="loginForm" class="w-full">

      <div class="text-center mb-6">
        <div class="text-2xl">🏠</div>
        <h1 class="text-3xl font-bold">Welcome Home</h1>
        <p class="text-gray-500 text-sm">Please enter your details</p>
      </div>

      <input type="email" placeholder="Email"
      class="w-full border rounded-full px-4 py-2 mb-3">

      <input type="password" placeholder="Password"
      class="w-full border rounded-full px-4 py-2 mb-3">

      <div class="flex justify-between text-sm text-gray-500 mb-4">
        <label><input type="checkbox"> Remember for 30 days</label>
        <a href="#">Forgot password?</a>
      </div>

      <button onclick="login()"
      class="bg-blue-500 text-white w-full py-2 rounded-full font-semibold hover:bg-blue-600">
      Login
      </button>

      <!-- OR -->
      <div class="flex items-center my-4">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="px-2 text-gray-400 text-sm">Or</span>
        <div class="flex-1 h-px bg-gray-300"></div>
      </div>

      <!-- Google, Apple, Facebook -->
      <div class="flex justify-center gap-4 mb-4">

        <button class="w-10 h-10 border rounded-full flex items-center justify-center">
          <img src="/img/apple.png" class="w-5 h-5 object-contain">
        </button>

        <button class="w-10 h-10 border rounded-full flex items-center justify-center">
          <img src="/img/google.png" class="w-5 h-5 object-contain">
        </button>

        <button class="w-10 h-10 border rounded-full flex items-center justify-center">
          <img src="/img/facebook.png" class="w-5 h-5 object-contain">
        </button>

      </div>

      <p class="text-center text-sm">
        Don't have an account?
        <button onclick="showSignup()" class="text-blue-500">Sign Up</button>
      </p>

    </div>

    <!-- SIGNUP -->
    <div id="signupForm" class="w-full hidden">

      <h1 class="text-3xl font-bold text-center mb-6">Sign Up</h1>

      <input type="text" placeholder="First Name"
      class="w-full border rounded-full px-4 py-2 mb-3">

      <input type="text" placeholder="Last Name"
      class="w-full border rounded-full px-4 py-2 mb-3">

      <input type="email" placeholder="Email"
      class="w-full border rounded-full px-4 py-2 mb-3">

      <input type="password" placeholder="Password"
      class="w-full border rounded-full px-4 py-2 mb-4">

      <button onclick="signup()"
      class="bg-blue-500 text-white w-full py-2 rounded-full font-semibold hover:bg-blue-600">
      Sign Up
      </button>

      <!-- OR -->
      <div class="flex items-center my-4">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="px-2 text-gray-400 text-sm">Or Sign Up With</span>
        <div class="flex-1 h-px bg-gray-300"></div>
      </div>

      <div class="flex justify-center gap-4 mb-4">

        <button class="w-10 h-10 border rounded-full flex items-center justify-center">
          <img src="/img/apple.png" class="w-5 h-5 object-contain">
        </button>

        <button class="w-10 h-10 border rounded-full flex items-center justify-center">
          <img src="/img/google.png" class="w-5 h-5 object-contain">
        </button>

        <button class="w-10 h-10 border rounded-full flex items-center justify-center">
          <img src="/img/facebook.png" class="w-5 h-5 object-contain">
        </button>

      </div>

      <p class="text-center text-sm">
        Already have an account?
        <button onclick="showLogin()" class="text-blue-500">Log in</button>
      </p>

    </div>

  </div>

</div>

<script>
function showSignup(){
document.getElementById("loginForm").classList.add("hidden");
document.getElementById("signupForm").classList.remove("hidden");
}

function showLogin(){
document.getElementById("signupForm").classList.add("hidden");
document.getElementById("loginForm").classList.remove("hidden");
}

function login(){
alert("Login berhasil");
}

function signup(){
alert("Akun berhasil dibuat");
}
</script>

</body>
</html>
